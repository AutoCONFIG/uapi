openapi: 3.1.0
info:
  title: OpenAI API
  description: The OpenAI REST API. Please see https://platform.openai.com/docs/api-reference
    for more details.
  version: 2.3.0
  termsOfService: https://openai.com/policies/terms-of-use
  contact:
    name: OpenAI Support
    url: https://help.openai.com/
  license:
    name: MIT
    url: https://github.com/openai/openai-openapi/blob/master/LICENSE
servers:
- url: https://api.openai.com/v1
path: /responses/input_tokens
paths:
  /responses/input_tokens:
    post:
      summary: 'Returns input token counts of the request.


        Returns an object with `object` set to `response.input_tokens` and an `input_tokens`
        count.'
      operationId: Getinputtokencounts
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenCountsBody'
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/TokenCountsBody'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenCountsResource'
      x-oaiMeta:
        name: Get input token counts
        group: responses
        examples:
          request:
            curl: "curl -X POST https://api.openai.com/v1/responses/input_tokens \\\
              \n    -H \"Content-Type: application/json\" \\\n    -H \"Authorization:\
              \ Bearer $OPENAI_API_KEY\" \\\n    -d '{\n      \"model\": \"gpt-5\"\
              ,\n      \"input\": \"Tell me a joke.\"\n    }'\n"
            javascript: "import OpenAI from \"openai\";\n\nconst client = new OpenAI();\n\
              \nconst response = await client.responses.inputTokens.count({\n  model:\
              \ \"gpt-5\",\n  input: \"Tell me a joke.\",\n});\n\nconsole.log(response.input_tokens);\n"
            python: "import os\nfrom openai import OpenAI\n\nclient = OpenAI(\n  \
              \  api_key=os.environ.get(\"OPENAI_API_KEY\"),  # This is the default\
              \ and can be omitted\n)\nresponse = client.responses.input_tokens.count()\n\
              print(response.input_tokens)"
            go: "package main\n\nimport (\n\t\"context\"\n\t\"fmt\"\n\n\t\"github.com/openai/openai-go\"\
              \n\t\"github.com/openai/openai-go/option\"\n\t\"github.com/openai/openai-go/responses\"\
              \n)\n\nfunc main() {\n\tclient := openai.NewClient(\n\t\toption.WithAPIKey(\"\
              My API Key\"),\n\t)\n\tresponse, err := client.Responses.InputTokens.Count(context.TODO(),\
              \ responses.InputTokenCountParams{})\n\tif err != nil {\n\t\tpanic(err.Error())\n\
              \t}\n\tfmt.Printf(\"%+v\\n\", response.InputTokens)\n}\n"
            ruby: 'require "openai"


              openai = OpenAI::Client.new(api_key: "My API Key")


              response = openai.responses.input_tokens.count


              puts(response)'
            java: "package com.openai.example;\n\nimport com.openai.client.OpenAIClient;\n\
              import com.openai.client.okhttp.OpenAIOkHttpClient;\nimport com.openai.models.responses.inputtokens.InputTokenCountParams;\n\
              import com.openai.models.responses.inputtokens.InputTokenCountResponse;\n\
              \npublic final class Main {\n    private Main() {}\n\n    public static\
              \ void main(String[] args) {\n        OpenAIClient client = OpenAIOkHttpClient.fromEnv();\n\
              \n        InputTokenCountResponse response = client.responses().inputTokens().count();\n\
              \    }\n}"
            node.js: "import OpenAI from 'openai';\n\nconst client = new OpenAI({\n\
              \  apiKey: process.env['OPENAI_API_KEY'], // This is the default and\
              \ can be omitted\n});\n\nconst response = await client.responses.inputTokens.count();\n\
              \nconsole.log(response.input_tokens);"
          response: "{\n  \"object\": \"response.input_tokens\",\n  \"input_tokens\"\
            : 11\n}\n"
