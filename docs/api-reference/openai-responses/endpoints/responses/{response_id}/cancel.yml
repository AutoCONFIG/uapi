servers:
- url: https://api.openai.com/v1
path: /responses/{response_id}/cancel
paths:
  /responses/{response_id}/cancel:
    post:
      operationId: cancelResponse
      tags:
      - Responses
      summary: "Cancels a model response with the given ID. Only responses created\
        \ with\nthe `background` parameter set to `true` can be cancelled. \n[Learn\
        \ more](/docs/guides/background).\n"
      parameters:
      - in: path
        name: response_id
        required: true
        schema:
          type: string
          example: resp_677efb5139a88190b512bc3fef8e535d
        description: The ID of the response to cancel.
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Response'
        '404':
          description: Not Found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
      x-oaiMeta:
        name: Cancel a response
        group: responses
        examples:
          request:
            curl: "curl -X POST https://api.openai.com/v1/responses/resp_123/cancel\
              \ \\\n    -H \"Content-Type: application/json\" \\\n    -H \"Authorization:\
              \ Bearer $OPENAI_API_KEY\"\n"
            javascript: 'import OpenAI from "openai";

              const client = new OpenAI();


              const response = await client.responses.cancel("resp_123");

              console.log(response);

              '
            python: "import os\nfrom openai import OpenAI\n\nclient = OpenAI(\n  \
              \  api_key=os.environ.get(\"OPENAI_API_KEY\"),  # This is the default\
              \ and can be omitted\n)\nresponse = client.responses.cancel(\n    \"\
              resp_677efb5139a88190b512bc3fef8e535d\",\n)\nprint(response.id)"
            node.js: "import OpenAI from 'openai';\n\nconst client = new OpenAI({\n\
