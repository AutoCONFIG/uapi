server:
  mode: "relay"
  host: "0.0.0.0"
  port: 8081
  max_body_size_mb: 256
  concurrency_limit: 0

security:
  jwt_secret: "relay-example-jwt-secret-32-chars"
  encryption_key: "1234567890abcdef1234567890abcdef1234567890abcdef1234567890abcdef"

gateway:
  gateway_id: "relay-node"
  cache_ttl: "5s"
  internal_secret: "relay-example-internal-secret-32c"
  require_internal: true
  control_url: "https://gateway.example.com"
  relay_node_id: "12345678-1234-4234-8234-123456789abc"
  config_pull_interval: "5s"

ws:
  max_message_size_mb: 256

logging:
  level: "info"
  retention_days: 180
