server:
  mode: "relay"
  host: "0.0.0.0"
  port: 8081
  max_body_size_mb: 50
  concurrency_limit: 0

security:
  jwt_secret: "unused-on-relay-but-keep-non-empty"
  encryption_key: "same-64-hex-encryption-key-as-gateway"

gateway:
  gateway_id: "relay-node"
  cache_ttl: "5s"
  internal_secret: "same-as-gateway-internal-secret"
  require_internal: true
  control_url: "http://uapi:8080" # same-host split; remote relay: change to https://your-gateway-host
  relay_node_id: "relay-node-uuid-from-admin-page"
  config_pull_interval: "5s"

logging:
  level: "info"
  retention_days: 180
