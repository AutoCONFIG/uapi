services:
  postgres:
    image: postgres:17-alpine
    container_name: uapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: uapi
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-uapi_dev}
      POSTGRES_DB: uapi
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uapi -d uapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  uapi:
    image: ghcr.io/autoconfig/uapi:${UAPI_TAG:-latest}
    container_name: uapi-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./assets:/app/assets
    ports:
      - "${API_BIND:-127.0.0.1}:${API_PORT:-8080}:8080"

  web:
    image: ghcr.io/autoconfig/uapi-web:${UAPI_TAG:-latest}
    container_name: uapi-web
    restart: unless-stopped
    depends_on:
      - uapi
    ports:
      - "${WEB_BIND:-127.0.0.1}:${WEB_PORT:-3000}:3000"

  relay:
    image: ghcr.io/autoconfig/uapi:${UAPI_TAG:-latest}
    container_name: uapi-relay
    restart: unless-stopped
    volumes:
      - ./config.relay.yaml:/app/config.yaml:ro
    ports:
      - "${RELAY_PORT:-8081}:8081"

volumes:
  pgdata:

networks:
  default:
    name: uapi-net
