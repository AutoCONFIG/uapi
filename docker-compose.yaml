services:
  postgres:
    image: postgres:17-alpine
    container_name: cli-relay-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay_dev
      POSTGRES_DB: cli_relay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  relay:
    build: .
    container_name: cli-relay
    restart: unless-stopped
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    volumes:
      - ./config.yaml:/app/config.yaml:ro

volumes:
  pgdata:
