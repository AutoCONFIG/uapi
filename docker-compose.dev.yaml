services:
  postgres:
    image: postgres:17-alpine
    container_name: cli-relay-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: relay_dev
      POSTGRES_DB: cli_relay
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
