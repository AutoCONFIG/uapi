services:
  postgres:
    image: postgres:17-alpine
    container_name: uapi-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: uapi
      POSTGRES_PASSWORD: uapi_dev
      POSTGRES_DB: uapi
    volumes:
      - ./pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U uapi -d uapi"]
      interval: 10s
      timeout: 5s
      retries: 5

  gateway:
    image: ghcr.io/autoconfig/uapi-gateway:latest
    container_name: uapi-gateway
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./config.yaml:/app/config.yaml
      - ./assets:/app/assets
      - ./debug-dumps:/app/debug-dumps
    ports:
      - "127.0.0.1:1240:8080"

networks:
  default:
    name: uapi-gateway-net
