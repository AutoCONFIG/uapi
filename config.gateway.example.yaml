server:
  mode: "gateway"
  host: "0.0.0.0"
  port: 8080
  max_body_size_mb: 256
  concurrency_limit: 0

database:
  host: "postgres"
  port: 5432
  user: "uapi"
  password: "uapi_dev"
  dbname: "uapi"
  sslmode: "disable"

security:
  jwt_secret: ""
  encryption_key: ""
  admin_username: "admin"
  admin_password_hash: ""

gateway:
  gateway_id: "default"
  cache_ttl: "5s"
  internal_secret: ""
  require_internal: false
  control_url: ""
  relay_node_id: ""
  config_pull_interval: "5s"

ws:
  max_message_size_mb: 256

auth:
  access_token_expiry: "15m"
  refresh_token_expiry: "720h"

logging:
  level: "info"
  retention_days: 180

user:
  max_keys_per_user: 1
