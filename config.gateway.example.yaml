server:
  mode: "gateway"
  host: "0.0.0.0"
  port: 8080
  max_body_size_mb: 256
  concurrency_limit: 0

database:
  host: "postgres"
  port: 5432
  user: "uapi"
  password: "uapi_dev"
  dbname: "uapi"
  sslmode: "disable"

security:
  jwt_secret: ""
  encryption_key: ""
  trusted_proxies: []

gateway:
  gateway_id: "default"
  cache_ttl: "5s"
  internal_secret: ""
  require_internal: false
  control_url: ""
  relay_node_id: ""
  config_pull_interval: "5s"

ws:
  host: ""
  port: 0
  max_message_size_mb: 256
  pool_idle_timeout_seconds: 0
  pool_max_conn_lifetime: 0
  pool_max_total_conns: 0
  pool_max_idle_per_key: 0
  stream_idle_timeout_seconds: 0
  max_connections: 0
  allowed_origins: []

auth:
  access_token_expiry: "15m"
  refresh_token_expiry: "720h"

logging:
  level: "info"
