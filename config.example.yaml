server:
  mode: "all" # all=Gateway+本机Relay；gateway=仅控制层；relay=仅转发节点
  host: "0.0.0.0"
  port: 8080
  max_body_size_mb: 256
  concurrency_limit: 0
  stream_idle_timeout_seconds: 1800

database:
  host: "postgres"
  port: 5432
  user: "uapi"
  password: "uapi_dev"
  dbname: "uapi"
  sslmode: "disable"

security:
  jwt_secret: ""
  encryption_key: ""
  trusted_proxies: []

auth:
  access_token_expiry: "15m"
  refresh_token_expiry: "720h"

gateway:
  gateway_id: "default"
  cache_ttl: "5s"
  internal_secret: ""
  require_internal: false  # 远端 relay 节点建议设为 true，只接受 Gateway 签名请求
  control_url: ""          # Relay 节点回报 Gateway/拉配置时填写，例如 http://gateway:8080
  relay_node_id: ""        # Relay 节点自身 ID，在管理后台创建节点后获得
  config_pull_interval: "5s"

logging:
  level: "info"

ws:
  host: ""
  port: 0
  max_message_size_mb: 256
  pool_idle_timeout_seconds: 0
  pool_max_conn_lifetime: 0
  pool_max_total_conns: 0
  pool_max_idle_per_key: 0
  stream_idle_timeout_seconds: 0
  max_connections: 0
  allowed_origins: []
