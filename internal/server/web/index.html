<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CLI Relay</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;background:#0f1117;color:#e0e0e0;min-height:100vh}
.container{max-width:800px;margin:0 auto;padding:20px}
h1{font-size:1.5rem;margin-bottom:20px;color:#fff}
h2{font-size:1.1rem;margin:20px 0 10px;color:#ccc}
.card{background:#1a1d27;border:1px solid #2a2d37;border-radius:8px;padding:16px;margin-bottom:12px}
.card-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.provider-name{font-weight:600;font-size:1rem}
.status{font-size:.75rem;padding:3px 8px;border-radius:12px;font-weight:500}
.status-active{background:#0d3320;color:#4ade80}
.status-stale{background:#3d2e00;color:#fbbf24}
.status-expired,.status-refresh_failed,.status-no_auth{background:#3b1111;color:#f87171}
.status-unknown{background:#1e293b;color:#94a3b8}
.btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.8rem;font-weight:500;transition:opacity .2s}
.btn:hover{opacity:.85}
.btn-primary{background:#3b82f6;color:#fff}
.btn-danger{background:#ef4444;color:#fff}
.btn-success{background:#22c55e;color:#fff}
.btn-secondary{background:#374151;color:#e0e0e0}
.btn-sm{padding:4px 10px;font-size:.75rem}
.actions{display:flex;gap:6px;flex-wrap:wrap}
.login-form{display:flex;gap:8px;margin-top:8px}
.login-form select,.login-form input{background:#0f1117;border:1px solid #2a2d37;color:#e0e0e0;padding:4px 8px;border-radius:4px;font-size:.8rem}
.token-info{font-size:.75rem;color:#888;margin-top:6px}
.login-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100}
.login-overlay.hidden{display:none}
.login-box{background:#1a1d27;border:1px solid #2a2d37;border-radius:12px;padding:32px;width:320px}
.login-box h2{margin:0 0 16px;text-align:center;color:#fff}
.login-box input{width:100%;padding:10px;border-radius:6px;border:1px solid #2a2d37;background:#0f1117;color:#e0e0e0;margin-bottom:12px;font-size:.9rem}
.login-box button{width:100%;padding:10px}
.error-msg{color:#f87171;font-size:.8rem;margin-bottom:8px}
.setup-note{text-align:center;font-size:.8rem;color:#888;margin-top:12px}
</style>
</head>
<body>

<div id="loginOverlay" class="login-overlay hidden">
  <div class="login-box">
    <h2>CLI Relay</h2>
    <div id="loginError" class="error-msg" style="display:none"></div>
    <input type="password" id="loginPassword" placeholder="Admin Password" autofocus>
    <button class="btn btn-primary" onclick="doLogin()">Login</button>
    <div id="setupNote" class="setup-note" style="display:none">First time? This password will be saved as your admin password.</div>
  </div>
</div>

<div class="container">
  <h1>CLI Relay</h1>
  <div id="providers"></div>
</div>

<script>
let sessionToken = '';

async function api(path, opts = {}) {
  const headers = opts.headers || {};
  if (sessionToken) headers['Authorization'] = 'Bearer ' + sessionToken;
  if (opts.body && typeof opts.body === 'object') {
    headers['Content-Type'] = 'application/json';
    opts.body = JSON.stringify(opts.body);
  }
  const res = await fetch(path, { ...opts, headers });
  if (res.status === 401) { showLogin(); throw new Error('unauthorized'); }
  return res.json();
}

async function checkAuth() {
  const st = await api('/api/v1/auth/status');
  if (st.has_admin) {
    if (!sessionToken) showLogin();
    else loadProviders();
  } else {
    document.getElementById('setupNote').style.display = 'block';
    showLogin();
  }
}

function showLogin() {
  document.getElementById('loginOverlay').classList.remove('hidden');
  document.getElementById('loginPassword').focus();
}

function hideLogin() {
  document.getElementById('loginOverlay').classList.add('hidden');
}

async function doLogin() {
  const pw = document.getElementById('loginPassword').value;
  const errEl = document.getElementById('loginError');
  try {
    const r = await api('/api/v1/auth/login', { method: 'POST', body: { password: pw } });
    sessionToken = r.token;
    hideLogin();
    loadProviders();
  } catch(e) {
    errEl.textContent = 'Invalid password';
    errEl.style.display = 'block';
  }
}

document.getElementById('loginPassword').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});

async function loadProviders() {
  const data = await api('/api/v1/providers');
  const el = document.getElementById('providers');
  if (!data.providers || data.providers.length === 0) {
    el.innerHTML = '<div class="card"><p style="color:#888">No providers configured. Enable providers in config.yaml.</p></div>';
    return;
  }
  el.innerHTML = data.providers.map(p => providerCard(p)).join('');
}

function statusClass(s) {
  const map = { active:'status-active', stale:'status-stale', expired:'status-expired', refresh_failed:'status-refresh_failed', no_auth:'status-no_auth' };
  return map[s] || 'status-unknown';
}

function providerCard(p) {
  const expires = p.expires_at ? new Date(p.expires_at).toLocaleString() : 'N/A';
  const lastRefresh = p.last_refresh ? new Date(p.last_refresh).toLocaleString() : 'N/A';
  return `
  <div class="card">
    <div class="card-header">
      <span class="provider-name">${p.name}</span>
      <span class="status ${statusClass(p.status)}">${p.status}</span>
    </div>
    <div class="token-info">Expires: ${expires} | Last refresh: ${lastRefresh}${p.error ? ' | Error: '+p.error : ''}</div>
    <div class="actions" style="margin-top:8px">
      <button class="btn btn-primary btn-sm" onclick="doRefresh('${p.name}')">Refresh</button>
      <button class="btn btn-success btn-sm" onclick="showLoginFlow('${p.name}')">Login</button>
      <button class="btn btn-secondary btn-sm" onclick="doRecover('${p.name}')">Recover</button>
      <button class="btn btn-danger btn-sm" onclick="doLogout('${p.name}')">Logout</button>
    </div>
    <div id="login-${p.name}" style="display:none;margin-top:8px">
      <div class="login-form">
        <select id="method-${p.name}">
          <option value="browser">Browser</option>
          <option value="device_code">Device Code</option>
          <option value="api_key">API Key</option>
        </select>
        <button class="btn btn-primary btn-sm" onclick="doLoginProvider('${p.name}')">Start</button>
      </div>
      <div id="login-result-${p.name}" class="token-info"></div>
    </div>
  </div>`;
}

function showLoginFlow(name) {
  const el = document.getElementById('login-' + name);
  el.style.display = el.style.display === 'none' ? 'block' : 'none';
}

async function doRefresh(name) {
  await api('/api/v1/providers/' + name + '/refresh', { method: 'POST' });
  loadProviders();
}

async function doRecover(name) {
  await api('/api/v1/providers/' + name + '/recover', { method: 'POST' });
  loadProviders();
}

async function doLogout(name) {
  if (!confirm('Logout ' + name + '?')) return;
  await api('/api/v1/providers/' + name + '/token', { method: 'DELETE' });
  loadProviders();
}

async function doLoginProvider(name) {
  const method = document.getElementById('method-' + name).value;
  const resultEl = document.getElementById('login-result-' + name);
  resultEl.textContent = 'Starting login...';
  try {
    const r = await api('/api/v1/providers/' + name + '/login', { method: 'POST', body: { method } });
    resultEl.textContent = 'Login successful! Expires: ' + (r.expires_at ? new Date(r.expires_at).toLocaleString() : 'N/A');
    setTimeout(loadProviders, 1000);
  } catch(e) {
    resultEl.textContent = 'Login failed: ' + e.message;
  }
}

checkAuth();
</script>
</body>
</html>
